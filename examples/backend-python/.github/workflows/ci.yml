name: "CI Pipeline - Backend Python API"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "backend-python-example"
  DOCKER_IMAGE_NAME: "backend-python-example"

jobs:
  quality:
    name: "Code Quality & Testing"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Format check (black)
        id: lint-black
        run: uv run black --check .

      - name: Lint (flake8)
        if: steps.lint-black.outcome == 'success'
        id: lint-flake8
        run: uv run flake8 src/ tests/

      - name: Import sorting (isort)
        if: steps.lint-flake8.outcome == 'success'
        id: lint-isort
        run: uv run isort --check-only .

      - name: Type check (mypy)
        if: steps.lint-isort.outcome == 'success'
        id: typecheck
        run: uv run mypy src/

      - name: Run tests with coverage
        if: steps.typecheck.outcome == 'success'
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term --cov-fail-under=80

      # Skip when running locally with act
      - name: Upload coverage report
        if: always() && !env.ACT
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 5

  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.actor != 'nektos/act' # Skip when running locally with act
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Compress image
        run: gzip /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  push:
    name: "Registry Push"
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.actor != 'nektos/act' # Skip when running locally with act
    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: |
          gunzip /tmp/image.tar.gz
          docker load --input /tmp/image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag and push
        run: |
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest
