name: "CI Pipeline - Frontend React/Next.js"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  APP_NAME: "frontend-react-example"

jobs:
  quality:
    name: "Code Quality & Testing"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check (Prettier)
        id: prettier-check
        run: npx prettier --check .

      - name: Lint (ESLint)
        if: steps.prettier-check.outcome == 'success'
        id: eslint-check
        run: npx eslint . --max-warnings 0

      - name: Type check (TypeScript)
        if: steps.eslint-check.outcome == 'success'
        id: typecheck
        run: npx tsc --noEmit

      - name: Run tests with coverage
        if: steps.typecheck.outcome == 'success'
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 5

  build:
    name: "Production Build"
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 5
