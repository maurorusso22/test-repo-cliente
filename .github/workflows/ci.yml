name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Code Quality (Lint + Test with conditional execution)
  quality:
    name: "Code Quality & Testing"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      # Linting first (fail-fast)
      - name: Lint with black
        id: lint-black
        run: uv run black --check .

      - name: Lint with flake8
        if: steps.lint-black.outcome == 'success'
        id: lint-flake8
        run: uv run flake8 src/ tests/

      - name: Sort imports with isort
        if: steps.lint-flake8.outcome == 'success'
        id: lint-isort
        run: uv run isort --check-only .

      # Testing only if all linting passes
      - name: Run tests with coverage
        if: steps.lint-isort.outcome == 'success'
        run: uv run pytest --cov=src --cov-report=xml --cov-report=term

  # Job 2: Helm Chart Validation
  helm-lint:
    name: "Helm Chart Linting"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: "latest"

      - name: Lint Helm chart
        run: helm lint ./helm-chart

      - name: Validate Helm templates
        run: helm template ml-api ./helm-chart --debug --dry-run

  # Job 3: Dockerfile Security (Pre-Build)
  dockerfile-security:
    name: "Dockerfile Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # Job 4: Config Security (Helm/K8s - can run in parallel)
  config-security:
    name: "Config Security"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "./helm-chart"
          format: "sarif"
          output: "trivy-config-results.sarif"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-config-results.sarif"
        continue-on-error: true # Don't fail CI if SARIF upload fails

  # Job 5: Docker Build (after quality + dockerfile security)
  build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [quality, helm-lint, dockerfile-security] # Updated dependencies
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false # Don't push yet, just build
          tags: ml-api-serving:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/ml-api-image.tar

      - name: Compress Docker image
        run: gzip /tmp/ml-api-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-api-image
          path: /tmp/ml-api-image.tar.gz
          retention-days: 1

  # Job 6: Image Security + Container Testing (Post-Build)
  image-security:
    name: "Image Security & Testing"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: ml-api-image
          path: /tmp

      - name: Decompress and load Docker image
        run: |
          gunzip /tmp/ml-api-image.tar.gz
          docker load --input /tmp/ml-api-image.tar

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "ml-api-serving:${{ github.sha }}"
          format: "sarif"
          output: "trivy-image-results.sarif"
          severity: "HIGH,CRITICAL"

      - name: Upload Trivy image results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-image-results.sarif"
        continue-on-error: true # Don't fail CI if SARIF upload fails

      # Container Integration Testing
      - name: Test container startup
        run: |
          # Start container in background
          docker run -d --name ml-api-test -p 8080:8000 ml-api-serving:${{ github.sha }}

          # Wait for startup
          sleep 10

          # Health check
          curl -f http://localhost:8080/health/check || exit 1

          # Test prediction endpoint
          curl -f -X POST http://localhost:8080/predict \
            -H "Content-Type: application/json" \
            -d '{"sepal_length":5.1,"sepal_width":3.5,"petal_length":1.4,"petal_width":0.2}' || exit 1

          # Clean up
          docker stop ml-api-test
          docker rm ml-api-test

      - name: Container logs (on failure)
        if: failure()
        run: |
          echo "=== Container Logs ==="
          docker logs ml-api-test || true
          docker stop ml-api-test || true
          docker rm ml-api-test || true

  # Job 7: Registry Push (Ready for secrets configuration)
  push:
    name: "Registry Push"
    runs-on: ubuntu-latest
    needs: [image-security, config-security] # Wait for all security checks
    if: github.ref == 'refs/heads/main' # Only on main branch
    steps:
      - uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: ml-api-image
          path: /tmp

      - name: Decompress and load Docker image
        run: |
          gunzip /tmp/ml-api-image.tar.gz
          docker load --input /tmp/ml-api-image.tar

      - name: Debug Docker secrets availability
        run: |
          echo "Checking Docker Hub secrets availability..."
          echo "DOCKER_USERNAME exists: ${{ secrets.DOCKER_USERNAME != '' }}"
          echo "DOCKER_TOKEN exists: ${{ secrets.DOCKER_TOKEN != '' }}"
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "❌ DOCKER_USERNAME is empty or not accessible"
          else
            echo "✅ DOCKER_USERNAME is available (length: ${#DOCKER_USERNAME})"
          fi
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag and push to registry
        run: |
          # Tag with commit SHA and latest
          docker tag ml-api-serving:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/ml-api-serving:${{ github.sha }}
          docker tag ml-api-serving:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/ml-api-serving:latest

          # Push both tags
          docker push ${{ secrets.DOCKER_USERNAME }}/ml-api-serving:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ml-api-serving:latest

      - name: Registry push summary
        run: |
          if [ -n "$DOCKER_USERNAME" ] && docker images | grep -q "$DOCKER_USERNAME/ml-api-serving" 2>/dev/null; then
            echo "🚀 Successfully pushed to Docker Hub:"
            echo "📦 $DOCKER_USERNAME/ml-api-serving:${{ github.sha }}"
            echo "📦 $DOCKER_USERNAME/ml-api-serving:latest"
          else
            echo "⚠️ Registry push skipped or failed"
            echo "🔍 Possible causes:"
            echo "   - Docker Hub secrets not configured properly"
            echo "   - Login authentication failed" 
            echo "   - Network connectivity issues"
            echo ""
            echo "✅ Main pipeline completed successfully (Jobs 1-6 passed)"
            echo "📝 Job 7 requires valid DOCKER_USERNAME and DOCKER_TOKEN secrets"
          fi
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
